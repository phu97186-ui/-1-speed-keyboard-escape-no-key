<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script chia sẻ</title>
    <style>
        body { background-color: #0d121d; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 28px; margin-bottom: 10px; color: #ffffff; }
        p { font-size: 16px; color: #b3bdcb; margin-bottom: 25px; }
        pre { background-color: #161f30; padding: 20px; border-radius: 8px; border: 1px solid #23324a; max-width: 90%; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); margin-bottom: 20px; }
        code { font-family: "Courier New", Courier, monospace; font-size: 15px; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.6); }
        .btn-copy { background-color: #007acc; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0, 122, 204, 0.3); }
        .btn-copy:hover { background-color: #0098ff; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 152, 255, 0.5); }
        .btn-copy:active { transform: translateY(1px); }
    </style>
</head>
<body>

    <h1>Script của tôi</h1>
    <p>Sao chép đoạn script dưới đây:</p>

    <!-- THAY ĐỔI ĐOẠN SCRIPT GAME CỦA BẠN Ở DƯỚI NÀY -->
    <pre><code id="scriptCode">loadstring(game:HttpGet("https://pastefy.app/NcLQfDTv/raw"))()))()</code></pre>

    <button class="btn-copy" id="copyBtn" onclick="copyScript()">Copy Script</button>

    <script>
        function copyScript() {
            var codeText = document.getElementById("scriptCode").innerText;
            navigator.clipboard.writeText(codeText).then(function() {
                var btn = document.getElementById("copyBtn");
                btn.innerText = "Đã Copy! ✓";
                btn.style.backgroundColor = "#2eb85c";
                btn.style.boxShadow = "0 4px 10px rgba(46, 184, 92, 0.5)";
                setTimeout(function() {
                    btn.innerText = "Copy Script";
                    btn.style.backgroundColor = "#007acc";
                    btn.style.boxShadow = "0 4px 10px rgba(0, 122, 204, 0.3)";
                }, 2000);
            }).catch(function(err) {
                alert("Lỗi không thể tự động copy!");
            });
        }
    </script>
</body>
</html>
